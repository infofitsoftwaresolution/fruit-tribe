name: Deploy Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure deploy script executable
        run: chmod +x scripts/deploy.sh

      - name: Deploy via SSH (secret-driven)
        uses: appleboy/ssh-action@v1.0.3
        env:
          APP_DIR: ${{ secrets.APP_DIR }}
          SERVER_NAME: ${{ secrets.SERVER_NAME }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
          PM2_APP_NAME: ${{ secrets.PM2_APP_NAME }}
          NGINX_CONF_NAME: ${{ secrets.NGINX_CONF_NAME }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          RAZORPAY_KEY_ID: ${{ secrets.RAZORPAY_KEY_ID }}
          RAZORPAY_KEY_SECRET: ${{ secrets.RAZORPAY_KEY_SECRET }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: APP_DIR,SERVER_NAME,BACKEND_PORT,PM2_APP_NAME,NGINX_CONF_NAME,DATABASE_URL,JWT_SECRET,ALLOWED_ORIGINS,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,SMTP_FROM,RAZORPAY_KEY_ID,RAZORPAY_KEY_SECRET
          script: |
            set -euo pipefail

            : "${APP_DIR:?APP_DIR secret missing}"
            : "${SERVER_NAME:?SERVER_NAME secret missing}"
            : "${BACKEND_PORT:?BACKEND_PORT secret missing}"
            : "${DATABASE_URL:?DATABASE_URL secret missing}"
            : "${JWT_SECRET:?JWT_SECRET secret missing}"

            PM2_APP_NAME="${PM2_APP_NAME:-fruittribe-backend}"
            NGINX_CONF_NAME="${NGINX_CONF_NAME:-fruittribe}"

            # Ensure repo exists and is updated
            if [ ! -d "$APP_DIR/.git" ]; then
              echo "ERROR: APP_DIR does not contain a git repo: $APP_DIR"
              exit 1
            fi

            cd "$APP_DIR"
            git fetch --all --prune
            git checkout main
            git reset --hard origin/main

            # Write backend env from secrets
            mkdir -p "$APP_DIR/backend"
            cat > "$APP_DIR/backend/.env" <<EOF
            NODE_ENV=production
            PORT=$BACKEND_PORT
            DATABASE_URL=$DATABASE_URL
            JWT_SECRET=$JWT_SECRET
            ALLOWED_ORIGINS=$ALLOWED_ORIGINS
            SMTP_HOST=$SMTP_HOST
            SMTP_PORT=$SMTP_PORT
            SMTP_USER=$SMTP_USER
            SMTP_PASS=$SMTP_PASS
            SMTP_FROM=$SMTP_FROM
            RAZORPAY_KEY_ID=$RAZORPAY_KEY_ID
            RAZORPAY_KEY_SECRET=$RAZORPAY_KEY_SECRET
            EOF

            chmod +x "$APP_DIR/scripts/deploy.sh"
            APP_DIR="$APP_DIR" \
            SERVER_NAME="$SERVER_NAME" \
            BACKEND_PORT="$BACKEND_PORT" \
            PM2_APP_NAME="$PM2_APP_NAME" \
            NGINX_CONF_NAME="$NGINX_CONF_NAME" \
            "$APP_DIR/scripts/deploy.sh"
